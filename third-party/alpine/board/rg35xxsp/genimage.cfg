image boot.erofs {
    erofs {
        label = "BOOT"
        extraargs = "-zlz4"
    }
    mountpoint = "boot-seed"
    size = 32M
}

image sdcard.f2fs {
    f2fs {
        label = "SDCARD"
    }
    mountpoint = "sdcard-seed"
    size = 384M
}

image sp-rg35xxsp.img {
    hdimage {
    }

    partition u-boot {
        in-partition-table = "no"
        image = "u-boot-sunxi-with-spl.bin"
        offset = 8K
    }

    partition boot {
        offset = 4M
        partition-type = 0x83
        bootable = "true"
        image = "boot.erofs"
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }

    partition sdcard {
        partition-type = 0x83
        image = "sdcard.f2fs"
    }
}
