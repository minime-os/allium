# Allium MTP config (FunctionFS mode)
loop_on_disconnect 1

# Primary SD card export.
storage "/mnt/SDCARD" "SDCARD" "rw"

manufacturer "Allium"
product "Allium RG35XXSP"
serial "SIMON0001"
firmware_version "2026.02"

# Empty string avoids host-side vendor-specific quirk assumptions.
mtp_extensions ""
interface "MTP"

usb_vendor_id 0x1D6B
usb_product_id 0x0100
usb_class 0x6
usb_subclass 0x1
usb_protocol 0x1
usb_dev_version 0x3008

# Flush data when transfer closes to reduce risk of corruption on unplug.
sync_when_close 0x1

usb_functionfs_mode 0x1
usb_dev_path "/dev/ffs-mtp/ep0"
usb_epin_path "/dev/ffs-mtp/ep1"
usb_epout_path "/dev/ffs-mtp/ep2"
usb_epint_path "/dev/ffs-mtp/ep3"
usb_max_packet_size 0x200
