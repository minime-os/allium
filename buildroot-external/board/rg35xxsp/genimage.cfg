image sdcard.vfat {
    vfat {
        label = "SDCARD"
        extraargs = "-F 32"
    }
    mountpoint = "sdcard-seed"
    size = 256M
}

image allium-rg35xxsp.img {
    hdimage {
    }

    partition u-boot {
        in-partition-table = "no"
        image = "u-boot-sunxi-with-spl.bin"
        offset = 8K
    }

    partition rootfs {
        offset = 4M
        partition-type = 0x83
        bootable = "true"
        image = "rootfs.erofs"
    }

    partition sdcard {
        partition-type = 0x0c
        image = "sdcard.vfat"
    }
}
