name: Nightly

permissions:
  contents: write

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check:
    name: check for changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      allium_sha: ${{ steps.check.outputs.allium_sha }}
      themes_sha: ${{ steps.check.outputs.themes_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for changes
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALLIUM_SHA=$(git rev-parse HEAD)
          THEMES_SHA=$(git ls-remote https://github.com/goweiwen/Allium-Themes.git HEAD | awk '{print $1}')

          echo "allium_sha=$ALLIUM_SHA" >> "$GITHUB_OUTPUT"
          echo "themes_sha=$THEMES_SHA" >> "$GITHUB_OUTPUT"

          echo "Current Allium: $ALLIUM_SHA"
          echo "Current Themes: $THEMES_SHA"

          if BODY=$(gh release view nightly --json body --jq .body 2>/dev/null); then
            LAST_ALLIUM=$(echo "$BODY" | grep -oP '^Allium:\s*\K\S+' || true)
            LAST_THEMES=$(echo "$BODY" | grep -oP '^Themes:\s*\K\S+' || true)

            echo "Last Allium:    ${LAST_ALLIUM:-<none>}"
            echo "Last Themes:    ${LAST_THEMES:-<none>}"

            if [ "$ALLIUM_SHA" = "$LAST_ALLIUM" ] && [ "$THEMES_SHA" = "$LAST_THEMES" ]; then
              echo "No changes since last nightly; skipping build."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "Changes detected; build will proceed."
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No existing nightly release; build will proceed."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  nightly:
    name: deploy nightly
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [ armv7-unknown-linux-gnueabihf ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Install rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
          override: true
          target: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild

      - name: Build target
        run: cargo zigbuild --release --bins --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          make all
          cd dist
          zip -r ../allium-${{ matrix.target }}.zip .allium .tmp_update RetroArch Apps BIOS Roms Saves Themes
          cd -

      - name: Move nightly tag
        run: |
          git tag -f nightly ${{ needs.check.outputs.allium_sha }}
          git push origin nightly --force

      - name: Update nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: 'allium-${{ matrix.target }}.zip'
          body: |
            Automated nightly build from the latest commit on main branch.

            **Warning**: This is an unstable development build and may contain bugs.

            Allium: ${{ needs.check.outputs.allium_sha }}
            Themes: ${{ needs.check.outputs.themes_sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
